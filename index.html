<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Erudit</title>
  <link href="https://cdn.jsdelivr.net/npm/beercss@4.0.16/dist/cdn/beer.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <script type="module" src="https://cdn.jsdelivr.net/npm/beercss@4.0.16/dist/cdn/beer.min.js"></script>
  <script type="module"
    src="https://cdn.jsdelivr.net/npm/material-dynamic-colors@1.1.4/dist/cdn/material-dynamic-colors.min.js"></script>
  <script src="https://unpkg.com/@rive-app/canvas"></script>
  <script type="module" src="app.js"></script>
  <script type="module" src="music.js"></script>
  <script type="module" src="theme.js"></script>
  <script type="module" src="quiz.js"></script>
</head>

<body>
  <div class="erd-bottom-shadow">
    <div class="erd-top-shadow">
      <header class="absolute top left right front white-text">
        <nav>
          <button class="circle secondary" id="back-btn" style="display:none">
            <i>arrow_back</i>
          </button>
          <div class="max"></div>
          <label class="switch icon">
            <input id="music-btn" type="checkbox">
            <span>
              <i>music_note</i>
            </span>
          </label>
          <label class="switch icon">
            <input id="dark-btn" type="checkbox">
            <span>
              <i>dark_mode</i>
            </span>
          </label>
        </nav>
      </header>
      <div id="s-bg-container" class="fixed top right bottom left back no-events">
        <canvas id="bg-canvas"></canvas>
      </div>
      <main class="bottom-align center-align">
        <div class="grid middle-align large-space">
          <div class="m6 l5 m l">
            <div class="right-align row">
              <div id="m-bg-container" class="ml-page-container round elevate page active left"></div>
            </div>
          </div>

          <div id="page-container" class="s12 m6 l7">
            <!-- Home page -->
            <div id="home" class="page active">
              <div class="s page active bottom">
                <nav class="scroll padding">
                  <a href="#/themes" class="tiny-width tiny-height round elevate surface-bright">
                    <img src="assets/icons/theme.svg" class="responsive" />
                  </a>
                  <a class="tiny-width tiny-height round elevate surface-bright">
                    <img src="assets/icons/collection.svg" class="responsive" />
                  </a>
                  <a href="#/quizzes" class="tiny-width tiny-height round elevate surface-bright padding">
                    <img src="assets/icons/chest.svg" class="responsive" />
                  </a>
                  <div class="tiny-width tiny-height round primary elevate"></div>
                </nav>
              </div>
              <div class="m page active right scroll" style="aspect-ratio: 9/19.5;">
                <nav class="center-align vertical padding">
                  <a href="#/themes" class="small-width small-height round elevate surface-bright">
                    <img src="assets/icons/theme.svg" class="responsive" />
                  </a>
                  <a class="small-width small-height round elevate surface-bright">
                    <img src="assets/icons/collection.svg" class="responsive" />
                  </a>
                  <a href="#/quizzes" class="small-width small-height round elevate surface-bright padding">
                    <img src="assets/icons/chest.svg" class="responsive" />
                  </a>
                  <div class="small-width small-height round primary"></div>
                </nav>
              </div>
              <div class="l scroll page active right">
                <div class="grid large-space">
                  <div class="l6 small-padding">
                    <a href="#/quizzes" class="small-width medium-height round elevate surface-bright">
                      <img src="assets/icons/chest.svg" class="responsive" />
                    </a>
                    <div class="space"></div>
                    <a href="#/themes" class="small-width small-height round elevate surface-bright">
                      <img src="assets/icons/theme.svg" class="responsive" />
                    </a>
                  </div>
                  <div class="l6 small-padding">
                    <a class="small-width small-height round elevate surface-bright">
                      <img src="assets/icons/collection.svg" class="responsive" />
                    </a>
                    <div class="space"></div>
                    <div class="row round medium-height fill"></div>
                  </div>
                </div>
              </div>
            </div>

            <!-- themes page -->
            <div id="themes" class="page">
              <div class="s page active bottom">
                <nav class="scroll padding">
                  <a data-theme="japan" class="tiny-width tiny-height round elevate surface-container-lowest">
                    <img src="assets/themes/japan-icon.svg" class="responsive" />
                  </a>
                  <a data-theme="egypt" class="tiny-width tiny-height round elevate surface-container-lowest">
                    <img src="assets/themes/egypt-icon.svg" class="responsive" />
                  </a>
                </nav>
              </div>
              <div class="m page active right scroll" style="aspect-ratio: 9/19.5;">
                <nav class="center-align vertical padding">
                  <a data-theme="japan" class="small-width small-height round elevate surface-container-lowest">
                    <img src="assets/themes/japan-icon.svg" class="responsive" />
                  </a>
                  <a data-theme="egypt" class="small-width small-height round elevate surface-container-lowest">
                    <img src="assets/themes/egypt-icon.svg" class="responsive" />
                  </a>
                </nav>
              </div>
              <div class="l scroll page active right">
                <div class="grid large-space">
                  <div class="l6 small-padding">
                    <div class="round medium-height fill"></div>
                    <div class="space"></div>
                    <a data-theme="japan" class="small-width small-height round elevate surface-container-lowest">
                      <img src="assets/themes/japan-icon.svg" class="responsive" />
                    </a>
                  </div>
                  <div class="l6 small-padding">
                    <a data-theme="egypt" class="small-width small-height round elevate surface-container-lowest">
                      <img src="assets/themes/egypt-icon.svg" class="responsive" />
                    </a>
                    <div class="space"></div>
                    <div class="round medium-height fill"></div>
                  </div>
                </div>
              </div>
            </div>

            <!-- quizzes page -->
            <div id="quizzes" class="page">
              <!-- add quiz -->
              <div id="/add-quiz" class="page">
                <div class="large-padding">
                  <button class="extra circle large-padding" data-ui="#add-dialog">
                    <i>add</i>
                  </button>
                </div>
              </div>

              <!-- do quiz -->
              <div id="/do-quiz" class="page active">
                <div class="s row vertical" style="height: 90dvh;">
                  <div class="active page top vertical">
                    <div class="elevate large-padding round medium-width small-blur">
                      <h4 class="quiz-progress-text primary-text left-align"></h4>
                      <progress class="quiz-progress-bar wavy large" value="1" max="1"></progress>
                    </div>

                    <div class="elevate large-padding round medium-width small-blur vertical row small-space">
                      <h6 class="quiz-question left-align"></h6>
                      <div class="quiz-answer-container medium-width page bottom vertical row small-space">
                        <p class="quiz-answer large-text left-align"></p>
                        <canvas class="question-pb responsive" style="height: 54px;"></canvas>
                      </div>
                    </div>

                  </div>
                  <div class="max"></div>
                  <div class="row center-align large-padding page active bottom">
                    <nav class="group connected primary-container">
                      <button class="quiz-wrong left-round extra" disabled>
                        <i>close</i>
                      </button>
                      <button class="quiz-reveal no-round extra">
                        <i>visibility</i>
                      </button>
                      <button class="quiz-next no-round extra" disabled>
                        <i>arrow_forward</i>
                      </button>
                      <button class="quiz-correct right-round extra" disabled>
                        <i>check</i>
                      </button>
                    </nav>
                  </div>
                </div>


                <div class="m l">
                  <div class="active page right">
                    <div class="row vertical ml-page-container middle-align">
                      <div class="elevate large-padding round medium-width surface-bright">
                        <h4 class="quiz-progress-text primary-text left-align"></h4>
                        <progress class="quiz-progress-bar wavy large" value="1" max="1"></progress>
                      </div>

                      <div class="elevate large-padding round medium-width surface-bright">
                        <h6 class="quiz-question left-align"></h6>
                        <div class="tiny-space"></div>
                        <div class="quiz-answer-container medium-width page bottom">
                          <p class="quiz-answer large-text left-align"></p>
                          <div class="tiny-space"></div>
                          <canvas class="question-pb responsive" style="height: 54px;"></canvas>
                        </div>
                      </div>
                      <div class="max"></div>
                      <div class="row center-align">
                        <nav class="group connected primary-container">
                          <button class="quiz-wrong left-round extra" disabled>
                            <i>close</i>
                          </button>
                          <button class="quiz-reveal no-round extra">
                            <i>visibility</i>
                          </button>
                          <button class="quiz-next no-round extra" disabled>
                            <i>arrow_forward</i>
                          </button>
                          <button class="quiz-correct right-round extra" disabled>
                            <i>check</i>
                          </button>
                        </nav>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>

      </main>

      <dialog id="add-dialog">
        <h5>Add New Quiz</h5>
        <div class="field label border">
          <input type="text" id="new-question" autocomplete="off">
          <label>Question</label>
        </div>
        <div class="field label border">
          <input type="text" id="new-answer" autocomplete="off">
          <label>Answer</label>
        </div>
        <nav class="right-align">
          <button class="transparent link" data-ui="#add-dialog">Cancel</button>
          <button class="primary" id="save-quiz-btn">Save</button>
        </nav>
      </dialog>
      <audio id="bg-music" src="assets/musics/home.mp3" loop></audio>
    </div>
  </div>
</body>
